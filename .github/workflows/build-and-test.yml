name: Selenium IDE CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    - name: Setup the .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '6.0.x'
    - name: Install Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
        sudo dpkg -i google-chrome-stable_current_amd64.deb || sudo apt-get -fy install
    - name: Install ChromeDriver (Fixed Version)
      run: |
        CHROMEDRIVER_VERSION="132.0.6834.11000"
        wget "https://chromedriver.storage.googleapis.com/${CHROMEDRIVER_VERSION}/chromedriver_linux64.zip"
        unzip chromedriver_linux64.zip
        sudo mv chromedriver /usr/bin/chromedriver
        sudo chmod +x /usr/bin/chromedriver
    - name: Set Chromedriver environment variable
      run: echo "CHROMEWEBDRIVER=$(which chromedriver)" >> $GITHUB_ENV
    - name: Install dependencies
      run: dotnet restore
    - name: Build the solution
      run: dotnet build --no-restore
    - name: Run the unit tests
      run: dotnet test --verbosity normal
